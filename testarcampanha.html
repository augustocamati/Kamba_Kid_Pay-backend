<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Criar Campanha</title>
</head>
<body>

<h2>Criar Campanha</h2>

<form action="http://localhost:3000/campanhas/criar" 
      method="POST" 
      enctype="multipart/form-data">

    <input type="text" name="nome" placeholder="Nome" required><br><br>

    <textarea name="descricao" placeholder="Descrição" required></textarea><br><br>

    <input type="number" name="meta_valor" placeholder="Meta Valor" required><br><br>

    <input type="date" name="date_inicio" required><br><br>

    <input type="date" name="date_fim" required><br><br>

    <input type="file" name="imagem"><br><br>

    <button type="submit">Criar Campanha</button>

</form>

</body>
</html>
